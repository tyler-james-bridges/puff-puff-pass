<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puff Puff Pass</title>
    <meta property="og:title" content="Puff Puff Pass" />
    <meta property="og:description" content="x402-gated virtual joint passing game. Grab the joint, pass it on, climb the leaderboard." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ppp.0x402.sh" />
    <meta name="description" content="x402-gated virtual joint passing game. Grab the joint, pass it on, climb the leaderboard." />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #111827;
        color: #f9fafb;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 24px;
        flex: 1;
      }

      .header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1,
      h2 {
        margin: 0;
      }

      .muted {
        color: #9ca3af;
      }

      .tiny {
        font-size: 0.84rem;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid #374151;
        border-radius: 9999px;
        padding: 4px 10px;
        background: #0f172a;
        color: #d1d5db;
        font-size: 0.82rem;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
        margin-top: 16px;
      }

      @media (min-width: 900px) {
        .grid {
          grid-template-columns: 1.2fr 1fr;
        }
      }

      .card {
        border: 1px solid #374151;
        background: #1f2937;
        border-radius: 12px;
        padding: 16px;
      }

      .stack {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .card + .card {
        margin-top: 16px;
      }

      .stat {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid #374151;
      }

      .stat:last-child {
        border-bottom: 0;
      }

      .label {
        color: #9ca3af;
      }

      form {
        display: grid;
        gap: 10px;
      }

      input,
      textarea,
      button {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #374151;
        background: #0f172a;
        color: #f9fafb;
        padding: 10px;
        font: inherit;
      }

      textarea {
        min-height: 72px;
        resize: vertical;
      }

      button {
        cursor: pointer;
        background: #1d4ed8;
        border-color: #1d4ed8;
        font-weight: 600;
      }

      button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }

      .status {
        min-height: 20px;
        font-size: 0.95rem;
      }

      .status.error {
        color: #f87171;
      }

      .status.ok {
        color: #34d399;
      }

      .list {
        list-style: none;
        margin: 10px 0 0;
        padding: 0;
        display: grid;
        gap: 8px;
      }

      .list-item {
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 10px;
        background: #111827;
        transition: border-color 0.35s ease, box-shadow 0.35s ease;
      }

      .list-item.changed {
        border-color: #10b981;
        box-shadow: 0 0 0 1px #10b98155 inset;
      }

      .top-line {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      a.link {
        color: #93c5fd;
        text-decoration: none;
      }

      a.link:hover {
        text-decoration: underline;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .badge {
        border: 1px solid #374151;
        border-radius: 9999px;
        padding: 2px 8px;
        font-size: 0.75rem;
        color: #d1d5db;
        background: #0f172a;
      }

      .refresh-btn {
        width: auto;
        padding: 4px 12px;
        font-size: 0.8rem;
        background: transparent;
        border-color: #374151;
        color: #9ca3af;
        font-weight: 400;
      }

      .refresh-btn:hover {
        border-color: #6b7280;
        color: #d1d5db;
      }

      .auto-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        color: #6b7280;
        cursor: pointer;
        user-select: none;
      }

      .auto-toggle .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #10b981;
        transition: background 0.2s;
      }

      .auto-toggle .dot.off {
        background: #4b5563;
      }

      .empty-state {
        text-align: center;
        padding: 24px 16px;
        color: #6b7280;
        font-size: 0.95rem;
      }

      footer {
        text-align: center;
        padding: 16px;
        font-size: 0.75rem;
        color: #4b5563;
      }

      footer a {
        color: #6b7280;
        text-decoration: none;
      }

      footer a:hover {
        color: #9ca3af;
        text-decoration: underline;
      }

      /* -- Wallet UI -- */
      .wallet-bar {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
        flex-wrap: wrap;
      }

      .wallet-btn {
        width: auto;
        padding: 8px 14px;
        font-size: 0.85rem;
        background: #7c3aed;
        border-color: #7c3aed;
        font-weight: 600;
        white-space: nowrap;
      }

      .wallet-btn:hover {
        background: #6d28d9;
        border-color: #6d28d9;
      }

      .wallet-addr {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.82rem;
        color: #a5b4fc;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 180px;
      }

      .wallet-chain {
        font-size: 0.75rem;
        color: #9ca3af;
      }

      .wallet-disconnect {
        width: auto;
        padding: 4px 10px;
        font-size: 0.75rem;
        background: transparent;
        border-color: #374151;
        color: #9ca3af;
        font-weight: 400;
      }

      .wallet-disconnect:hover {
        border-color: #ef4444;
        color: #f87171;
      }

      /* -- Mobile responsiveness -- */
      @media (max-width: 768px) {
        .wrap {
          padding: 16px 12px;
        }

        .header {
          flex-direction: column;
          align-items: flex-start;
        }

        h1 {
          font-size: 1.4rem;
        }

        .card {
          padding: 12px;
        }

        input, textarea, button {
          padding: 12px;
          font-size: 1rem;
          min-height: 44px;
        }

        .refresh-btn {
          min-height: 36px;
          padding: 6px 14px;
        }

        .top-line {
          flex-wrap: wrap;
          gap: 4px;
        }

        .list-item {
          padding: 8px;
          overflow: hidden;
        }

        .list-item .mono {
          font-size: 0.72rem;
          word-break: break-all;
        }

        .list-item .row {
          overflow: hidden;
        }

        .stat {
          font-size: 0.9rem;
        }

        .stack {
          gap: 6px;
        }

        .wallet-addr {
          max-width: 140px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <header class="header">
        <div>
          <h1>🌿 Puff Puff Pass</h1>
          <p class="muted">x402-gated virtual joint leaderboard</p>
        </div>
        <div class="row">
          <span id="auto-toggle" class="auto-toggle">
            <span id="auto-dot" class="dot"></span>
            <span id="auto-label">auto</span>
          </span>
          <button id="refresh-btn" class="refresh-btn" type="button">Refresh</button>
        </div>
      </header>

      <section class="grid">
        <div>
          <article class="card">
            <h2>Current Holder</h2>
            <div id="holder-content">
              <div class="empty-state">No one's holding the joint yet. Be the first to puff.</div>
            </div>
            <div class="stack">
              <span id="network-pill" class="pill" style="display:none">Connecting...</span>
              <span id="updated-pill" class="pill" style="display:none">Updated: —</span>
            </div>
          </article>

          <article class="card">
            <h2>Pass the Joint</h2>
            <p class="muted tiny">Each pass costs $0.00402 in USDC via x402 protocol.</p>
            <div id="wallet-bar" class="wallet-bar">
              <button id="wallet-connect-btn" class="wallet-btn" type="button">Connect Wallet</button>
            </div>
            <form id="pass-form">
              <input name="handle" placeholder="your handle (required)" maxlength="50" required />
              <input name="txHash" type="hidden" />
              <textarea name="message" placeholder="say something (optional)"></textarea>
              <button id="submit-btn" type="submit">🚬 Pass It</button>
            </form>
            <p id="pass-status" class="status muted">Ready.</p>
          </article>
        </div>

        <div>
          <article class="card">
            <h2>Leaderboard</h2>
            <ul id="leaderboard-list" class="list"></ul>
          </article>

          <article class="card">
            <h2>Feed</h2>
            <ul id="feed-list" class="list"></ul>
          </article>
        </div>
      </section>
    </main>

    <footer>Powered by <a href="https://www.x402.org/" target="_blank" rel="noopener noreferrer">x402</a></footer>

    <script src="https://unpkg.com/ethers@6/dist/ethers.min.js"></script>
    <script>
      const holderContentEl = document.getElementById("holder-content");
      const currentTotalEl = document.getElementById("current-total");
      const passFeeEl = document.getElementById("pass-fee");
      const networkPillEl = document.getElementById("network-pill");
      const updatedPillEl = document.getElementById("updated-pill");
      const autoToggleEl = document.getElementById("auto-toggle");
      const autoDotEl = document.getElementById("auto-dot");
      const autoLabelEl = document.getElementById("auto-label");
      const leaderboardListEl = document.getElementById("leaderboard-list");
      const feedListEl = document.getElementById("feed-list");
      const statusEl = document.getElementById("pass-status");
      const passFormEl = document.getElementById("pass-form");
      const submitBtnEl = document.getElementById("submit-btn");

      let previousRanks = new Map();
      let previousTopFeedId = null;
      let autoRefresh = true;

      // -- Wallet state --
      let walletProvider = null;
      let walletSigner = null;
      let walletAddress = null;
      let walletChainId = null;

      const walletBarEl = document.getElementById("wallet-bar");
      const walletConnectBtnEl = document.getElementById("wallet-connect-btn");

      const CHAIN_NAMES = {
        8453: "Base",
        2741: "Abstract",
        84532: "Base Sepolia",
        11124: "Abstract Testnet"
      };

      const CHAIN_TO_NETWORK = {
        8453: "eip155:8453",
        2741: "eip155:2741",
        84532: "eip155:84532",
        11124: "eip155:11124"
      };

      // USDC token metadata per chain for EIP-3009 domain
      const USDC_META = {
        8453: {
          address: "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913",
          name: "USD Coin",
          version: "2",
          decimals: 6
        },
        2741: {
          address: "0x84a71ccd554cc1b02749b35d22f684cc8ec987e1",
          name: "Bridged USDC (Stargate)",
          version: "2",
          decimals: 6
        }
      };

      function shortAddress(addr) {
        if (!addr) return "";
        return addr.slice(0, 6) + "..." + addr.slice(-4);
      }

      function renderWalletBar() {
        if (!walletAddress) {
          walletBarEl.innerHTML = '<button id="wallet-connect-btn" class="wallet-btn" type="button">Connect Wallet</button>';
          walletBarEl.querySelector("#wallet-connect-btn").addEventListener("click", connectWallet);
          return;
        }
        const chainName = CHAIN_NAMES[walletChainId] || `Chain ${walletChainId}`;
        walletBarEl.innerHTML =
          `<span class="wallet-addr" title="${walletAddress}">${shortAddress(walletAddress)}</span>` +
          `<span class="wallet-chain">${chainName}</span>` +
          `<button class="wallet-disconnect" type="button">Disconnect</button>`;
        walletBarEl.querySelector(".wallet-disconnect").addEventListener("click", disconnectWallet);
      }

      async function connectWallet() {
        if (typeof window.ethereum === "undefined") {
          setStatus("No wallet detected. Install MetaMask or a compatible browser wallet.", "error");
          return;
        }
        try {
          walletProvider = new ethers.BrowserProvider(window.ethereum);
          walletSigner = await walletProvider.getSigner();
          walletAddress = await walletSigner.getAddress();
          const network = await walletProvider.getNetwork();
          walletChainId = Number(network.chainId);
          renderWalletBar();
          setStatus("Wallet connected. Ready to pass.", "ok");

          // Listen for account/chain changes
          window.ethereum.on("accountsChanged", handleAccountsChanged);
          window.ethereum.on("chainChanged", handleChainChanged);
        } catch (err) {
          setStatus("Wallet connection failed: " + (err.message || String(err)), "error");
        }
      }

      function handleAccountsChanged(accounts) {
        if (!accounts.length) {
          disconnectWallet();
          return;
        }
        walletAddress = accounts[0];
        renderWalletBar();
      }

      function handleChainChanged() {
        // Re-init provider on chain switch
        connectWallet();
      }

      function disconnectWallet() {
        walletProvider = null;
        walletSigner = null;
        walletAddress = null;
        walletChainId = null;
        if (window.ethereum) {
          window.ethereum.removeListener("accountsChanged", handleAccountsChanged);
          window.ethereum.removeListener("chainChanged", handleChainChanged);
        }
        renderWalletBar();
        setStatus("Ready.", "muted");
      }

      walletConnectBtnEl.addEventListener("click", connectWallet);

      // -- x402 browser payment flow --
      function parsePaymentRequired(response) {
        // The 402 response has a base64-encoded JSON in the payment-required header
        // and also sends accepts info we need
        const payReqHeader = response.headers.get("payment-required");
        if (!payReqHeader) return null;
        try {
          return JSON.parse(atob(payReqHeader));
        } catch {
          return null;
        }
      }

      function findMatchingAccept(accepts, chainId) {
        // Pick the accept item that matches the user's wallet chain
        const network = CHAIN_TO_NETWORK[chainId];
        if (!network || !accepts) return null;
        const arr = Array.isArray(accepts) ? accepts : [accepts];
        return arr.find((a) => a.network === network) || null;
      }

      async function buildPaymentSignature(acceptItem, payTo, signer, signerAddress) {
        const chainId = Number(acceptItem.network.split(":")[1]);
        const usdcMeta = USDC_META[chainId];
        if (!usdcMeta) throw new Error("Unsupported chain for browser payment: " + acceptItem.network);

        // Determine amount from the accept item
        let amount;
        if (typeof acceptItem.price === "object" && acceptItem.price.amount) {
          amount = acceptItem.price.amount;
        } else if (typeof acceptItem.price === "string") {
          // Parse "$0.00402" format to micro-units
          const numeric = parseFloat(acceptItem.price.replace("$", ""));
          amount = String(Math.round(numeric * 1_000_000));
        } else {
          throw new Error("Cannot parse price from accept item");
        }

        const validAfter = "0";
        const validBefore = String(Math.floor(Date.now() / 1000) + 900);
        const nonce = ethers.hexlify(ethers.randomBytes(32));

        // EIP-3009 TransferWithAuthorization typed data
        const domain = {
          name: usdcMeta.name,
          version: usdcMeta.version,
          chainId: chainId,
          verifyingContract: usdcMeta.address
        };

        const types = {
          TransferWithAuthorization: [
            { name: "from", type: "address" },
            { name: "to", type: "address" },
            { name: "value", type: "uint256" },
            { name: "validAfter", type: "uint256" },
            { name: "validBefore", type: "uint256" },
            { name: "nonce", type: "bytes32" }
          ]
        };

        const message = {
          from: signerAddress,
          to: payTo,
          value: amount,
          validAfter: validAfter,
          validBefore: validBefore,
          nonce: nonce
        };

        setStatus("Waiting for wallet signature...", "muted");
        const signature = await signer.signTypedData(domain, types, message);

        // Build the x402 payment payload
        const paymentPayload = {
          x402Version: 2,
          scheme: "exact",
          network: acceptItem.network,
          payload: {
            signature: signature,
            authorization: {
              from: signerAddress,
              to: payTo,
              value: amount,
              validAfter: validAfter,
              validBefore: validBefore,
              nonce: nonce
            }
          }
        };

        return btoa(JSON.stringify(paymentPayload));
      }

      function shortHash(hash) {
        if (!hash || hash === "pending") return hash || "";
        return `${hash.slice(0, 10)}…${hash.slice(-6)}`;
      }

      function explorerUrl(network, txHash) {
        if (!txHash || txHash === "pending") return null;
        const map = {
          "eip155:2741": "https://abscan.org/tx/",
          "eip155:11124": "https://sepolia.abscan.org/tx/",
          "eip155:8453": "https://basescan.org/tx/",
          "eip155:84532": "https://sepolia.basescan.org/tx/"
        };
        return map[network] ? `${map[network]}${txHash}` : null;
      }

      function decodePaymentHeader(value) {
        try {
          return JSON.parse(atob(value));
        } catch {
          return null;
        }
      }

      function setStatus(text, type = "muted") {
        statusEl.textContent = text;
        statusEl.className = `status ${type}`;
      }

      function renderHolder(current) {
        if (!current.currentHolder) {
          holderContentEl.innerHTML = '<div class="empty-state">No one\'s holding the joint yet. Be the first to puff.</div>';
          return;
        }
        holderContentEl.innerHTML = `
          <div class="stat"><span class="label">Handle</span><strong>@${current.currentHolder}</strong></div>
          <div class="stat"><span class="label">Total Passes</span><strong>${current.totalPasses ?? 0}</strong></div>
          <div class="stat"><span class="label">Pass Fee</span><strong>$${current.passFeeUsd}</strong></div>
        `;
      }

      function renderLeaderboard(items) {
        leaderboardListEl.innerHTML = "";
        if (!items.length) {
          leaderboardListEl.innerHTML = '<li class="list-item muted">No one on the board yet. Hit that pass button.</li>';
          return;
        }

        const nextRanks = new Map();

        for (const row of items.slice(0, 10)) {
          const li = document.createElement("li");
          li.className = "list-item";
          nextRanks.set(row.handle, row.rank);
          if (previousRanks.has(row.handle) && previousRanks.get(row.handle) !== row.rank) {
            li.classList.add("changed");
          }

          const badges = Array.isArray(row.badges)
            ? row.badges.slice(0, 3).map((badge) => `<span class="badge">${badge}</span>`).join("")
            : "";

          li.innerHTML = `
            <div class="top-line"><strong>#${row.rank} @${row.handle}</strong><span>${row.score} pts</span></div>
            <div class="muted">passes: ${row.totalPasses} · streak: ${row.longestStreak} · first takes: ${row.firstTakes}</div>
            <div class="stack">${badges || '<span class="muted tiny">No badges yet</span>'}</div>
          `;
          leaderboardListEl.appendChild(li);
        }

        previousRanks = nextRanks;
      }

      function renderFeed(items, network) {
        feedListEl.innerHTML = "";
        if (!items.length) {
          feedListEl.innerHTML = '<li class="list-item muted">It\'s quiet in here. Make some noise.</li>';
          return;
        }

        for (const item of items.slice(0, 8)) {
          const li = document.createElement("li");
          li.className = "list-item";
          if (previousTopFeedId && item.id === items[0]?.id && item.id !== previousTopFeedId) {
            li.classList.add("changed");
          }

          const txUrl = explorerUrl(network, item.txHash);
          const txHtml = item.txHash
            ? item.txHash === "pending"
              ? '<span class="muted">tx pending...</span>'
              : txUrl
                ? `<a class="link mono" href="${txUrl}" target="_blank" rel="noopener noreferrer">${shortHash(item.txHash)}</a>`
                : `<span class="mono">${shortHash(item.txHash)}</span>`
            : '<span class="muted">no tx</span>';

          li.innerHTML = `
            <div class="top-line"><strong>@${item.handle}</strong><span class="muted">${new Date(item.createdAt).toLocaleString()}</span></div>
            <div class="muted">${item.gainLine || "pass logged"}</div>
            <div class="row"><span class="mono muted">${item.status}</span>·${txHtml}</div>
          `;
          feedListEl.appendChild(li);
        }

        previousTopFeedId = items[0]?.id || null;
      }

      async function refreshAll() {
        const [healthRes, currentRes, leaderboardRes, feedRes] = await Promise.all([
          fetch("/api/health"),
          fetch("/api/joint/current"),
          fetch("/api/leaderboard"),
          fetch("/api/feed?limit=20")
        ]);

        const health = await healthRes.json();
        const current = await currentRes.json();
        const leaderboard = await leaderboardRes.json();
        const feed = await feedRes.json();

        const activeNetwork = Array.isArray(health?.x402?.networks)
          ? health.x402.networks.join(", ")
          : null;

        renderHolder(current);

        if (activeNetwork) {
          networkPillEl.textContent = `Network: ${activeNetwork}`;
          networkPillEl.style.display = "";
        } else {
          networkPillEl.style.display = "none";
        }

        updatedPillEl.textContent = `Updated: ${new Date().toLocaleTimeString()}`;
        updatedPillEl.style.display = "";

        renderLeaderboard(leaderboard.items || []);
        renderFeed(feed.items || [], health?.x402?.networks?.[0]);
      }

      passFormEl.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitBtnEl.disabled = true;

        const formData = new FormData(passFormEl);
        const payload = {
          handle: String(formData.get("handle") || "").trim(),
          txHash: String(formData.get("txHash") || "").trim() || undefined,
          message: String(formData.get("message") || "").trim() || undefined
        };

        try {
          // If wallet is connected, use the browser payment flow
          if (walletAddress && walletSigner) {
            setStatus("Sending request...", "muted");

            // Step 1: POST without payment header to get the 402 response
            const initialRes = await fetch("/api/joint/pass", {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(payload)
            });

            if (initialRes.status === 402) {
              // Step 2: Parse the 402 response to get payment requirements
              const payReq = parsePaymentRequired(initialRes);
              if (!payReq) throw new Error("Could not parse payment requirements from server.");

              const accepts = payReq.accepts || payReq;
              const acceptItem = findMatchingAccept(accepts, walletChainId);

              if (!acceptItem) {
                const supported = (Array.isArray(accepts) ? accepts : [accepts])
                  .map((a) => CHAIN_NAMES[Number(a.network?.split(":")[1])] || a.network)
                  .join(", ");
                throw new Error(
                  "Your wallet is on " + (CHAIN_NAMES[walletChainId] || "chain " + walletChainId) +
                  ". Switch to a supported network: " + supported
                );
              }

              const payTo = acceptItem.payTo;

              // Step 3: Build and sign the EIP-3009 authorization
              const paymentSigHeader = await buildPaymentSignature(
                acceptItem, payTo, walletSigner, walletAddress
              );

              // Step 4: Re-send with payment signature
              setStatus("Submitting payment...", "muted");
              const paidRes = await fetch("/api/joint/pass", {
                method: "POST",
                headers: {
                  "content-type": "application/json",
                  "payment-signature": paymentSigHeader
                },
                body: JSON.stringify(payload)
              });

              const paidBody = await paidRes.json().catch(() => ({}));
              if (!paidRes.ok) {
                throw new Error(paidBody?.error || `Payment failed: HTTP ${paidRes.status}`);
              }

              const paymentResponse = paidRes.headers.get("payment-response");
              let successText = `Pass accepted for @${payload.handle}`;
              if (paymentResponse) {
                const decoded = decodePaymentHeader(paymentResponse);
                if (decoded?.transaction) {
                  const txUrl = explorerUrl(decoded.network, decoded.transaction);
                  successText = txUrl
                    ? `Pass accepted! tx: ${shortHash(decoded.transaction)} (${CHAIN_NAMES[walletChainId] || decoded.network})`
                    : `Pass accepted! tx: ${shortHash(decoded.transaction)}`;
                }
              }

              setStatus(successText, "ok");
              passFormEl.reset();
              await refreshAll();
              return;

            } else if (initialRes.ok) {
              // Server accepted without 402 (unlikely but handle it)
              setStatus(`Pass accepted for @${payload.handle}`, "ok");
              passFormEl.reset();
              await refreshAll();
              return;
            } else {
              const body = await initialRes.json().catch(() => ({}));
              throw new Error(body?.error || `HTTP ${initialRes.status}`);
            }
          }

          // No wallet connected - original flow (will get 402 without browser payment)
          setStatus("Submitting and waiting for payment verification...", "muted");
          const res = await fetch("/api/joint/pass", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload)
          });

          const body = await res.json().catch(() => ({}));
          const paymentResponse = res.headers.get("payment-response");

          if (!res.ok) {
            const errorText = body?.error || `HTTP ${res.status}`;
            const hint = res.status === 402
              ? " -- connect a wallet above to pay from your browser"
              : "";
            throw new Error(errorText + hint);
          }

          let successText = `Pass accepted for @${payload.handle}`;
          if (paymentResponse) {
            const decoded = decodePaymentHeader(paymentResponse);
            if (decoded?.transaction) {
              const txUrl = explorerUrl(decoded.network, decoded.transaction);
              successText = txUrl
                ? `Pass accepted for @${payload.handle} · tx: ${shortHash(decoded.transaction)} (${decoded.network})`
                : `Pass accepted for @${payload.handle} · tx: ${shortHash(decoded.transaction)}`;
            }
          }

          setStatus(successText, "ok");
          passFormEl.reset();
          await refreshAll();
        } catch (error) {
          setStatus(error.message || String(error), "error");
        } finally {
          submitBtnEl.disabled = false;
        }
      });

      document.getElementById("refresh-btn").addEventListener("click", () => {
        refreshAll().catch((error) => setStatus(error.message || String(error), "error"));
      });

      setInterval(() => {
        if (!autoRefresh || submitBtnEl.disabled) return;
        refreshAll().catch(() => {});
      }, 8000);

      autoToggleEl.addEventListener("click", () => {
        autoRefresh = !autoRefresh;
        autoDotEl.className = autoRefresh ? "dot" : "dot off";
        autoLabelEl.textContent = autoRefresh ? "auto" : "paused";
      });

      refreshAll().catch((error) => setStatus(error.message || String(error), "error"));
    </script>
  </body>
</html>
